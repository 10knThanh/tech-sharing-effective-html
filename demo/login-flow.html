<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Login flow</title>
<style>
  :root {
    --bg: #FAF9F5; --surface: #FFFFFF; --ink: #141413;
    --line: #D1CFC5; --muted: #87867F;
    --clay: #D97757; --clay-soft: rgba(217,119,87,0.10);
    --olive: #788C5D; --olive-soft: rgba(120,140,93,0.12);
    --gold: #C9A45C; --gold-soft: rgba(201,164,92,0.14);
  }
  body {
    margin: 0; min-height: 100vh; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: system-ui, sans-serif;
  }
  .flow { display: flex; flex-direction: column; align-items: center; }
  .node {
    min-width: 200px; text-align: center; color: var(--ink);
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 10px; padding: 12px 22px; font-size: 15px; font-weight: 600;
  }
  .node.client { background: var(--clay-soft); border-color: var(--clay); }
  .node.svc    { background: var(--olive-soft); border-color: var(--olive); }
  .node.data   { background: var(--gold-soft); border-color: var(--gold); }
  .arrow { position: relative; width: 2px; height: 22px; background: var(--muted); }
  .arrow::after {
    content: ""; position: absolute; bottom: -1px; left: -3.5px;
    border: 4.5px solid transparent; border-top-color: var(--muted); border-bottom: none;
  }
</style>
</head>
<body>
  <div class="flow">
    <div class="node client">User</div>
    <div class="arrow"></div>
    <div class="node client">App</div>
    <div class="arrow"></div>
    <div class="node svc">Backend</div>
    <div class="arrow"></div>
    <div class="node data">Database</div>
  </div>
</body>
</html>
